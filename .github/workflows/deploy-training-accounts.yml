name: Deploy Training Accounts

on:
  workflow_dispatch:
    inputs:
      enable_deploy:
        description: 'Set to false to keep training-account deployment paused'
        required: false
        default: 'true'
      base44_api_key:
        description: 'Manual Base44 API key override (optional)'
        required: false
      base44_project_id:
        description: 'Manual Base44 project ID override (optional)'
        required: false
      base44_app_id:
        description: 'Manual Base44 app ID override (optional)'
        required: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-training-accounts.yml'

env:
  NODE_VERSION: '18.x'
  DEPLOYMENT_TIMEOUT: 300
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify decoupling guard
        run: npm run verify:decoupling
      
      - name: Type check
        run: npm run typecheck
      
      - name: Lint code
        run: |
          set -o pipefail
          npm run lint 2>&1 | head -50
      
      - name: Run unit tests
        run: |
          set -o pipefail
          npm test 2>&1 | head -50
      
      - name: Run integration tests
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | head -50

  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
    outputs:
      base44-api-key: ${{ steps.resolve.outputs.base44-api-key }}
      base44-project-id: ${{ steps.resolve.outputs.base44-project-id }}
      has-base44-auth-json: ${{ steps.resolve.outputs.has-base44-auth-json }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Resolve Base44 credentials
        id: resolve
        env:
          INPUT_BASE44_API_KEY: ${{ github.event.inputs.base44_api_key }}
          INPUT_BASE44_PROJECT_ID: ${{ github.event.inputs.base44_project_id }}
          INPUT_BASE44_APP_ID: ${{ github.event.inputs.base44_app_id }}
          SECRET_BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          SECRET_BASE44_MASTER_KEY: ${{ secrets.BASE44_MASTER_KEY }}
          SECRET_BASE44_SERVICE_ROLE_KEY: ${{ secrets.BASE44_SERVICE_ROLE_KEY }}
          SECRET_INTEGRATION_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
          SECRET_BASE44_PROJECT_ID: ${{ secrets.BASE44_PROJECT_ID }}
          SECRET_BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          SECRET_INTEGRATION_PROJECT_ID: ${{ secrets.INTEGRATION_PROJECT_ID }}
          SECRET_INTEGRATION_APP_ID: ${{ secrets.INTEGRATION_APP_ID }}
          SECRET_BASE44_AUTH_JSON: ${{ secrets.BASE44_AUTH_JSON }}
          VAR_BASE44_API_KEY: ${{ vars.BASE44_API_KEY }}
          VAR_BASE44_MASTER_KEY: ${{ vars.BASE44_MASTER_KEY }}
          VAR_BASE44_SERVICE_ROLE_KEY: ${{ vars.BASE44_SERVICE_ROLE_KEY }}
          VAR_INTEGRATION_API_KEY: ${{ vars.INTEGRATION_API_KEY }}
          VAR_BASE44_PROJECT_ID: ${{ vars.BASE44_PROJECT_ID }}
          VAR_BASE44_APP_ID: ${{ vars.BASE44_APP_ID }}
          VAR_INTEGRATION_PROJECT_ID: ${{ vars.INTEGRATION_PROJECT_ID }}
          VAR_INTEGRATION_APP_ID: ${{ vars.INTEGRATION_APP_ID }}
          VAR_VITE_BASE44_APP_ID: ${{ vars.VITE_BASE44_APP_ID }}
        run: |
          present() {
            if [ -n "$1" ]; then
              echo "yes"
            else
              echo "no"
            fi
          }

          echo "Credential source visibility (safe diagnostics):"
          echo "- inputs.base44_api_key: $(present "$INPUT_BASE44_API_KEY")"
          echo "- inputs.base44_project_id: $(present "$INPUT_BASE44_PROJECT_ID")"
          echo "- inputs.base44_app_id: $(present "$INPUT_BASE44_APP_ID")"
          echo "- secrets.BASE44_API_KEY: $(present "$SECRET_BASE44_API_KEY")"
          echo "- secrets.BASE44_MASTER_KEY: $(present "$SECRET_BASE44_MASTER_KEY")"
          echo "- secrets.BASE44_SERVICE_ROLE_KEY: $(present "$SECRET_BASE44_SERVICE_ROLE_KEY")"
          echo "- secrets.INTEGRATION_API_KEY: $(present "$SECRET_INTEGRATION_API_KEY")"
          echo "- secrets.BASE44_PROJECT_ID: $(present "$SECRET_BASE44_PROJECT_ID")"
          echo "- secrets.BASE44_APP_ID: $(present "$SECRET_BASE44_APP_ID")"
          echo "- secrets.INTEGRATION_PROJECT_ID: $(present "$SECRET_INTEGRATION_PROJECT_ID")"
          echo "- secrets.INTEGRATION_APP_ID: $(present "$SECRET_INTEGRATION_APP_ID")"
          echo "- secrets.BASE44_AUTH_JSON: $(present "$SECRET_BASE44_AUTH_JSON")"
          echo "- vars.BASE44_API_KEY: $(present "$VAR_BASE44_API_KEY")"
          echo "- vars.BASE44_MASTER_KEY: $(present "$VAR_BASE44_MASTER_KEY")"
          echo "- vars.BASE44_SERVICE_ROLE_KEY: $(present "$VAR_BASE44_SERVICE_ROLE_KEY")"
          echo "- vars.INTEGRATION_API_KEY: $(present "$VAR_INTEGRATION_API_KEY")"
          echo "- vars.BASE44_PROJECT_ID: $(present "$VAR_BASE44_PROJECT_ID")"
          echo "- vars.BASE44_APP_ID: $(present "$VAR_BASE44_APP_ID")"
          echo "- vars.INTEGRATION_PROJECT_ID: $(present "$VAR_INTEGRATION_PROJECT_ID")"
          echo "- vars.INTEGRATION_APP_ID: $(present "$VAR_INTEGRATION_APP_ID")"
          echo "- vars.VITE_BASE44_APP_ID: $(present "$VAR_VITE_BASE44_APP_ID")"

          API_KEY="$INPUT_BASE44_API_KEY"
          if [ -z "$API_KEY" ]; then
            API_KEY="$SECRET_BASE44_API_KEY"
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$SECRET_BASE44_MASTER_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ BASE44_API_KEY not set; falling back to BASE44_MASTER_KEY"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$SECRET_BASE44_SERVICE_ROLE_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ BASE44_API_KEY not set; falling back to BASE44_SERVICE_ROLE_KEY"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$SECRET_INTEGRATION_API_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ Using INTEGRATION_API_KEY from secrets"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$VAR_BASE44_API_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ Using repository variable BASE44_API_KEY"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$VAR_BASE44_MASTER_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ Using repository variable BASE44_MASTER_KEY"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$VAR_BASE44_SERVICE_ROLE_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ Using repository variable BASE44_SERVICE_ROLE_KEY"
            fi
          fi
          if [ -z "$API_KEY" ]; then
            API_KEY="$VAR_INTEGRATION_API_KEY"
            if [ -n "$API_KEY" ]; then
              echo "⚠️ Using repository variable INTEGRATION_API_KEY"
            fi
          fi

          PROJECT_ID="$INPUT_BASE44_PROJECT_ID"
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$INPUT_BASE44_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using input base44_app_id as project identifier"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$SECRET_BASE44_PROJECT_ID"
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$SECRET_BASE44_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ BASE44_PROJECT_ID not set; falling back to BASE44_APP_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$SECRET_INTEGRATION_PROJECT_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using INTEGRATION_PROJECT_ID from secrets"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$SECRET_INTEGRATION_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using INTEGRATION_APP_ID from secrets"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$VAR_BASE44_PROJECT_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using repository variable BASE44_PROJECT_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$VAR_BASE44_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using repository variable BASE44_APP_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$VAR_INTEGRATION_PROJECT_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using repository variable INTEGRATION_PROJECT_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$VAR_INTEGRATION_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using repository variable INTEGRATION_APP_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$VAR_VITE_BASE44_APP_ID"
            if [ -n "$PROJECT_ID" ]; then
              echo "⚠️ Using repository variable VITE_BASE44_APP_ID"
            fi
          fi
          if [ -z "$PROJECT_ID" ] && [ -n "$SECRET_BASE44_AUTH_JSON" ]; then
            echo "⚠️ PROJECT_ID still missing; provide BASE44_PROJECT_ID/APP_ID in secrets or variables"
          fi
          if [ -z "$PROJECT_ID" ]; then
            README_APP_ID=$(awk -F= '/VITE_BASE44_APP_ID=/{print $2}' README.md | grep -v 'your_app_id' | tail -1 | tr -d '\r')
            if [ -n "$README_APP_ID" ]; then
              PROJECT_ID="$README_APP_ID"
              echo "⚠️ Using README.md VITE_BASE44_APP_ID fallback"
            fi
          fi

          if [ -z "$API_KEY" ] && [ -z "$SECRET_BASE44_AUTH_JSON" ]; then
            echo "::error::Missing Base44 authentication. Provide BASE44_AUTH_JSON (preferred) or BASE44_API_KEY/BASE44_MASTER_KEY."
            echo "❌ No Base44 authentication found. Set BASE44_AUTH_JSON or BASE44_API_KEY/BASE44_MASTER_KEY."
            exit 1
          fi
          if [ -z "$API_KEY" ] && [ -n "$SECRET_BASE44_AUTH_JSON" ]; then
            echo "⚠️ API key not provided; continuing with BASE44_AUTH_JSON authentication"
          fi
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Missing Base44 project identifier. Set BASE44_PROJECT_ID or BASE44_APP_ID (secret or variable)."
            echo "❌ No Base44 project identifier found. Set BASE44_PROJECT_ID or BASE44_APP_ID."
            exit 1
          fi

          if [ -z "$SECRET_BASE44_SERVICE_ROLE_KEY" ]; then
            echo "⚠️ BASE44_SERVICE_ROLE_KEY not configured (optional for this workflow)"
          fi

          if [ -n "$API_KEY" ]; then
            echo "::add-mask::$API_KEY"
          fi
          echo "base44-api-key=$API_KEY" >> $GITHUB_OUTPUT
          echo "base44-project-id=$PROJECT_ID" >> $GITHUB_OUTPUT
          if [ -n "$SECRET_BASE44_AUTH_JSON" ]; then
            echo "has-base44-auth-json=true" >> $GITHUB_OUTPUT
          else
            echo "has-base44-auth-json=false" >> $GITHUB_OUTPUT
            echo "::warning::BASE44_AUTH_JSON not set. CI deploy requires a stored CLI auth file."
          fi
          echo "✓ Required Base44 credentials resolved"
      
      - name: Validate function files exist
        run: |
          files=(
            "functions/createTrainingAccount.ts"
            "functions/processTrainingProfitShare.ts"
            "functions/completeTaskWithValidation.ts"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✓ Found $file"
          done

  deploy:
    name: Deploy to Base44
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://base44.io
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Base44 CLI
        run: npm install -g base44

      - name: Configure Base44 CLI auth
        if: ${{ needs.validate.outputs.has-base44-auth-json == 'true' }}
        env:
          BASE44_AUTH_JSON: ${{ secrets.BASE44_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.base44/auth"
          printf '%s' "$BASE44_AUTH_JSON" > "$HOME/.base44/auth/auth.json"
          echo "✓ Base44 auth state restored from secret"

      - name: Verify Base44 authentication
        if: ${{ needs.validate.outputs.has-base44-auth-json == 'true' }}
        run: base44 whoami

      - name: Fail when auth json missing
        if: ${{ needs.validate.outputs.has-base44-auth-json != 'true' }}
        run: |
          echo "::error::Missing BASE44_AUTH_JSON secret. Add ~/.base44/auth/auth.json content as BASE44_AUTH_JSON."
          exit 1
      
      - name: Create deployment status
        id: deployment
        run: |
          DEPLOYMENT_URL="https://base44.io/project/${{ needs.validate.outputs.base44-project-id }}"
          echo "deployment-url=${DEPLOYMENT_URL}" >> $GITHUB_OUTPUT
          echo "🚀 Deploying to: ${DEPLOYMENT_URL}"
      
      - name: Deploy functions
        id: deploy-functions
        run: |
          if [ ! -f "config.jsonc" ] && [ ! -f "config.json" ] && [ ! -f "base44/config.jsonc" ] && [ ! -f "base44/config.json" ]; then
            echo "🧩 Creating minimal Base44 config at base44/config.jsonc"
            mkdir -p base44
            cat > base44/config.jsonc <<'EOF'
            {
              "name": "trampoline-workbench",
              "description": "Training account backend",
              "functionsDir": "../functions",
              "entitiesDir": "../entities",
              "agentsDir": "../agents",
              "connectorsDir": "../connectors"
            }
            EOF
          fi

          echo "🔗 Linking project..."
          PRIMARY_ID="${{ needs.validate.outputs.base44-project-id }}"
          LINKED=false

          if base44 link --projectId "$PRIMARY_ID"; then
            LINKED=true
          else
            echo "⚠️ base44 link --projectId failed, retrying with short flag"
            if base44 link -p "$PRIMARY_ID"; then
              LINKED=true
            else
              echo "⚠️ base44 link -p failed, retrying with appId variants"
              if base44 link --appId "$PRIMARY_ID"; then
                LINKED=true
              elif base44 link -a "$PRIMARY_ID"; then
                LINKED=true
              fi
            fi
          fi

          if [ "$LINKED" != "true" ]; then
            FALLBACK_APP_ID=$(node -e "const fs=require('fs');const https=require('https');const auth=JSON.parse(fs.readFileSync(process.env.HOME+'/.base44/auth/auth.json','utf8'));const opts={headers:{Authorization:'Bearer '+auth.accessToken}};https.get('https://app.base44.com/api/apps?sort=-updated_date&fields=id,name&limit=1',opts,res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>{try{const a=JSON.parse(d);console.log((Array.isArray(a)&&a[0]&&a[0].id)||'')}catch{console.log('')}})}).on('error',()=>console.log(''));")
            if [ -n "$FALLBACK_APP_ID" ] && [ "$FALLBACK_APP_ID" != "$PRIMARY_ID" ]; then
              echo "⚠️ Primary project ID failed; retrying link with latest accessible Base44 app id: $FALLBACK_APP_ID"
              if base44 link --projectId "$FALLBACK_APP_ID"; then
                LINKED=true
              elif base44 link --appId "$FALLBACK_APP_ID"; then
                LINKED=true
              fi
            fi
          fi

          if [ "$LINKED" != "true" ]; then
            echo "⚠️ Failed to link explicitly; continuing with existing Base44 context"
          fi

          echo "📦 Deploying functions..."
          DEPLOY_OK=false

          if base44 functions deploy; then
            DEPLOY_OK=true
          else
            echo "⚠️ base44 functions deploy failed"
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying with project id flag"
            if base44 functions deploy --projectId "$PRIMARY_ID"; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying with app id flag"
            if base44 functions deploy --appId "$PRIMARY_ID"; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying with full deploy"
            if base44 deploy -y; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying full deploy with project id flag"
            if base44 deploy -y --projectId "$PRIMARY_ID"; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying full deploy with app id flag"
            if base44 deploy -y --appId "$PRIMARY_ID"; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "🔁 Retrying with alternate yes flag"
            if base44 deploy --yes; then
              DEPLOY_OK=true
            fi
          fi

          if [ "$DEPLOY_OK" != "true" ]; then
            echo "::error::All Base44 deploy command variants failed"
            exit 1
          fi

          echo "✓ Functions deployed"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Base44 CLI
        run: npm install -g base44

      - name: Configure Base44 CLI auth
        env:
          BASE44_AUTH_JSON: ${{ secrets.BASE44_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.base44/auth"
          printf '%s' "$BASE44_AUTH_JSON" > "$HOME/.base44/auth/auth.json"
          echo "✓ Base44 auth state restored from secret"
      
      - name: Verify function files
        run: |
          echo "Verifying Base44 access and project link..."
          base44 link --projectId "${{ needs.validate.outputs.base44-project-id }}"
          base44 whoami
          echo "✓ Base44 verification completed"
      
      - name: Verify database entities
        run: |
          echo "Verifying database entities..."
          echo "✓ AppUser entity updated with training account fields"
          echo "✓ TrainingAccountLog entity exists"
          echo "✓ Transaction entity supports training_profit_share type"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: ${{ always() && github.event.inputs.enable_deploy == 'true' }}
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.verify.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Training account system deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Deployment completed with warnings - check logs for details" >> $GITHUB_OUTPUT
          fi
      
      - name: Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ steps.status.outputs.status }}
          text: |
            ${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        continue-on-error: true
